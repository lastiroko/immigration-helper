spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

jwt:
  secret: test-secret-key-for-testing-only-must-be-at-least-32-characters
  expiration-ms: 3600000
  refresh-expiration-ms: 86400000

stripe:
  api-key: sk_test_placeholder
  webhook-secret: whsec_placeholder
  premium-price-id: price_test_premium
  enterprise-price-id: price_test_enterprise
